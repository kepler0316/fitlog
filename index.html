<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100天 · 150→140</title>
<style>
  :root{
    --bg:#F2F4EF; --paper:#FFFFFF; --ink:#1C2B27; --muted:#6C7A74;
    --pine:#1F5C49; --pine-deep:#143D31; --pine-soft:#E3EDE7;
    --amber:#E5A33C; --amber-soft:#FBF1DE;
    --melon:#D98B6F; --melon-soft:#F7E7DF;
    --red:#C95B43; --line:#DFE6DF;
    --radius:14px; font-size:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'PingFang SC','HarmonyOS Sans SC','Noto Sans SC','Microsoft YaHei',sans-serif;
    -webkit-font-smoothing:antialiased; padding:18px 14px 60px;
    max-width:560px; margin:0 auto;
  }
  .num{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace; font-variant-numeric:tabular-nums;}

  header{margin-bottom:14px;}
  .eyebrow{font-size:.72rem; letter-spacing:.18em; color:var(--pine); font-weight:600; margin-bottom:4px;}
  h1{font-size:1.5rem; font-weight:700;}
  h1 .range{color:var(--muted); font-weight:500; font-size:1rem; margin-left:6px;}
  .sub{font-size:.82rem; color:var(--muted); margin-top:4px; line-height:1.5;}

  .card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
  .card h2{font-size:.92rem; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px;}
  .card h2::before{content:''; width:4px; height:14px; background:var(--pine); border-radius:2px;}

  /* 双进度环 */
  .rings{display:flex; gap:14px; align-items:center; justify-content:center; flex-wrap:wrap;}
  .ring-item{display:flex; flex-direction:column; align-items:center; gap:6px; min-width:130px;}
  .ring-label{font-size:.74rem; color:var(--muted); font-weight:600;}
  .ring-sub{font-size:.68rem; color:var(--muted);}

  /* 100格点阵 */
  .grid{display:grid; grid-template-columns:repeat(20,1fr); gap:3px; margin:14px 0 8px;}
  .gcell{aspect-ratio:1; border-radius:3px; background:var(--paper); border:1px solid var(--line);}
  .gcell.done{background:var(--pine); border-color:var(--pine);}
  .gcell.drink{background:var(--amber-soft); border-color:var(--amber);}
  .gcell.both{background:var(--pine); border-color:var(--amber); border-width:2px;}
  .gcell.today{outline:2px solid var(--amber); outline-offset:1px;}
  .grid-legend{display:flex; gap:12px; font-size:.68rem; color:var(--muted); flex-wrap:wrap; margin-bottom:4px;}
  .grid-legend span{display:flex; align-items:center; gap:4px;}
  .dot{width:9px; height:9px; border-radius:3px; display:inline-block;}

  .stats{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px 6px; margin-top:6px;}
  .stat{padding:6px 2px; text-align:center;}
  .stat .v{font-size:1.35rem; font-weight:700; color:var(--pine-deep);}
  .stat .v small{font-size:.72rem; font-weight:500; color:var(--muted);}
  .stat .v.warn{color:var(--red);}
  .stat .l{font-size:.66rem; color:var(--muted); margin-top:2px;}
  .stat .d{font-size:.68rem; margin-top:2px; font-weight:600;}
  .d.down{color:var(--pine);} .d.up{color:var(--red);} .d.flat{color:var(--muted);}
  .note-line{margin-top:12px; font-size:.72rem; color:var(--muted); text-align:center; line-height:1.6;}
  .note-line .alert{color:var(--red); font-weight:600;}

  .frow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;}
  .frow.full{grid-template-columns:1fr;}
  label{font-size:.72rem; color:var(--muted); display:block; margin-bottom:4px;}
  input,select{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:9px;
    font-size:.92rem; font-family:inherit; background:#FBFCFA; color:var(--ink);
  }
  input:focus,select:focus{outline:2px solid var(--pine); border-color:var(--pine);}
  .bp-pair{display:flex; align-items:center; gap:6px;}
  .bp-pair input{min-width:0;}
  .bp-pair .slash{color:var(--muted); font-weight:600;}
  .seg{display:flex; gap:6px;}
  .seg .opt{
    flex:1; text-align:center; padding:9px 4px; border:1px solid var(--line); border-radius:9px;
    font-size:.78rem; color:var(--muted); background:#FBFCFA; cursor:pointer; user-select:none;
    transition:background .15s,color .15s,border-color .15s;
  }
  .seg .opt.on{color:#fff; font-weight:600;}
  .seg.green .opt.on{background:var(--pine); border-color:var(--pine);}
  .seg.amber .opt.on{background:var(--amber); border-color:var(--amber);}
  .seg.melon .opt.on{background:var(--melon); border-color:var(--melon);}
  .conditional{margin-top:10px;}
  button.save{
    width:100%; padding:12px; border:none; border-radius:10px; background:var(--pine);
    color:#fff; font-size:.95rem; font-weight:600; cursor:pointer; margin-top:4px;
  }
  button.save:active{background:var(--pine-deep);}
  .toast{font-size:.78rem; text-align:center; margin-top:8px; min-height:1.2em; color:var(--pine); font-weight:600;}
  .toast.err{color:var(--red);}

  .chart-wrap{overflow:hidden;}
  .chart-empty{font-size:.8rem; color:var(--muted); text-align:center; padding:18px 0;}

  .log-item{display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px dashed var(--line); font-size:.82rem;}
  .log-item:last-child{border-bottom:none;}
  .log-item .ld{width:48px; flex:none; font-weight:600;}
  .log-item .lc{flex:1; line-height:1.45; color:#33433D;}
  .log-item .lc .meta{display:block; font-size:.7rem; color:var(--muted); margin-top:2px;}
  .tag{flex:none; font-size:.64rem; padding:2px 7px; border-radius:99px; font-weight:600;}
  .tag.ex{background:var(--pine); color:#fff;}
  .tag.drink{background:var(--amber-soft); color:#9A6A1B;}
  .log-empty{font-size:.8rem; color:var(--muted); text-align:center; padding:16px 0;}

  details{font-size:.8rem; color:var(--muted); line-height:1.7;}
  details summary{cursor:pointer; font-weight:600; color:var(--ink); font-size:.86rem;}
  .loading{text-align:center; color:var(--muted); font-size:.85rem; padding:30px 0;}
  @media (max-width:380px){ .stat .v{font-size:1.15rem;} }
</style>
</head>
<body>

<header>
  <div class="eyebrow">脂肪肝逆转 · 100天</div>
  <h1>150 → 140<span class="range num">6.23 – 9.30</span></h1>
  <div class="sub">100 天 · 目标 50 次运动 · 每两天至少练 1 次 · 减重 10 斤（150→140）</div>
</header>

<div id="app"><div class="loading">正在读取记录…</div></div>

<script>
/* ============ 配置 ============ */
const START = '2026-06-23';
const END   = '2026-09-30';
const TOTAL_DAYS = 100;
const TARGET_EX = 50;
const W_START = 150, W_GOAL = 140;
const STORE_KEY = 'plan100_logs';
let logs = {};

/* ============ 存储适配（Claude / 独立部署通用）============ */
const store = {
  async get(k){
    if (typeof window.storage !== 'undefined' && window.storage){
      try{ return await window.storage.get(k); }catch(e){ return null; }
    }
    try{ const v = localStorage.getItem(k); return v?{value:v}:null; }catch(e){ return null; }
  },
  async set(k,v){
    if (typeof window.storage !== 'undefined' && window.storage){
      const r = await window.storage.set(k,v); if(!r) throw new Error('fail'); return r;
    }
    localStorage.setItem(k,v); return {key:k};
  }
};

/* ============ 工具 ============ */
function todayStr(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
const TODAY = todayStr();
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
const elapsedDays = Math.min(Math.max(daysBetween(START,TODAY)+1,0),TOTAL_DAYS);
const FRUIT_HIGH = ['西瓜','荔枝','芒果','葡萄','桃子','橘子/橙','香蕉','菠萝','椰子','梨'];

async function loadLogs(){
  try{ const r=await store.get(STORE_KEY); if(r&&r.value) logs=JSON.parse(r.value); }catch(e){ logs={}; }
}
async function saveLogs(){ await store.set(STORE_KEY, JSON.stringify(logs)); }

function ring(pct,color,size=92){
  const r=size/2-8, c=2*Math.PI*r, off=c*(1-Math.min(pct,1));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--pine-soft)" stroke-width="9"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="9"
      stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
      transform="rotate(-90 ${size/2} ${size/2})"/>
  </svg>`;
}

/* ============ 渲染 ============ */
function render(){
  const app=document.getElementById('app');
  const entries=Object.entries(logs).sort((a,b)=>a[0]<b[0]?-1:1);

  const exCount=entries.filter(([d,l])=>l.ex && l.ex!=='休息' && Number(l.min)>=10).length;
  const exPct=exCount/TARGET_EX;

  // 运动余额：每过1天消耗0.5次配额，每运动1次+1。余额≥0 = 守住"两天一次"节奏
  // 余额 = 已运动次数 - 已过天数/2
  const balance = exCount - elapsedDays/2;
  const onPace = balance >= 0;
  // 把余额翻译成人话
  let paceMsg;
  if(elapsedDays===0){ paceMsg='计划还没开始'; }
  else if(balance >= 1){ paceMsg=`✓ 超前 ${balance.toFixed(1)} 次，后面可以喘口气`; }
  else if(balance >= 0){ paceMsg='✓ 节奏刚好跟上'; }
  else if(balance >= -1){ paceMsg=`欠 ${(-balance).toFixed(1)} 次，今明两天补一次就回正`; }
  else { paceMsg=`⚠ 欠 ${(-balance).toFixed(1)} 次，节奏落后了，尽快补上`; }

  const wLogged=entries.filter(([d,l])=>l.weight).map(([d,l])=>({d,v:Number(l.weight)}));
  // 150斤为固定起点基准，加在所有实测记录之前
  const wEntries=[{d:START,v:W_START,base:true}].concat(wLogged);
  const latestW=wLogged.length?wLogged[wLogged.length-1].v:W_START;
  const firstW=W_START;
  const lostTotal=W_START-latestW;
  const wPct=lostTotal/(W_START-W_GOAL);

  const sleepVals=entries.filter(([d,l])=>l.sleep).map(([d,l])=>Number(l.sleep));
  const avgSleep=sleepVals.length?sleepVals.reduce((a,b)=>a+b,0)/sleepVals.length:null;
  const hrVals=entries.filter(([d,l])=>l.hr).map(([d,l])=>Number(l.hr));
  const latestHR=hrVals.length?hrVals[hrVals.length-1]:null;
  const bpVals=entries.filter(([d,l])=>l.sbp&&l.dbp).map(([d,l])=>({s:+l.sbp,d:+l.dbp}));
  const avgS=bpVals.length?bpVals.reduce((a,b)=>a+b.s,0)/bpVals.length:null;
  const avgD=bpVals.length?bpVals.reduce((a,b)=>a+b.d,0)/bpVals.length:null;
  const bpWarn=avgS!==null&&(avgS>=135||avgD>=85);
  const waistVals=entries.filter(([d,l])=>l.waist).map(([d,l])=>Number(l.waist));
  const latestWaist=waistVals.length?waistVals[waistVals.length-1]:null;

  const drinkDays=entries.filter(([d,l])=>l.drink&&l.drink!=='no').length;
  const fruitDays=entries.filter(([d,l])=>l.fruit).length;
  const drinkRate=elapsedDays>0?Math.round((elapsedDays-drinkDays)/elapsedDays*100):null;

  /* 100格 */
  let gridCells='';
  for(let i=0;i<TOTAL_DAYS;i++){
    const dt=new Date(START); dt.setDate(dt.getDate()+i);
    const ds=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const l=logs[ds];
    let cls='';
    const didEx=l&&l.ex&&l.ex!=='休息'&&Number(l.min)>=10;
    const didDrink=l&&l.drink&&l.drink!=='no';
    if(didEx&&didDrink) cls='both';
    else if(didEx) cls='done';
    else if(didDrink) cls='drink';
    const today=ds===TODAY?' today':'';
    gridCells+=`<div class="gcell ${cls}${today}" title="${ds}"></div>`;
  }

  /* 体重折线：起点150 + 实测记录，至少1次实测即可画 */
  let chart='<div class="chart-empty">记录第一次体重后，这里出现从 150 斤起的趋势线（目标 140 虚线）</div>';
  if(wLogged.length>=1){
    const W=480,H=130,P=28;
    const allV=wEntries.map(e=>e.v).concat([W_GOAL]);
    const mn=Math.min(...allV),mx=Math.max(...allV);
    const span=(mx-mn)<1?1:(mx-mn);
    const x=i=>P+i*(W-2*P)/(wEntries.length-1);
    const y=v=>H-P-(v-mn)/span*(H-2*P);
    const pts=wEntries.map((e,i)=>`${x(i).toFixed(1)},${y(e.v).toFixed(1)}`).join(' ');
    const dots=wEntries.map((e,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(e.v).toFixed(1)}" r="${e.base?3.5:3}" fill="${e.base?'#fff':'#1F5C49'}" stroke="#1F5C49" stroke-width="${e.base?2:0}"/>`).join('');
    const gy=y(W_GOAL).toFixed(1);
    const li=wEntries.length-1;
    chart=`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="体重趋势">
      <line x1="${P}" y1="${gy}" x2="${W-P}" y2="${gy}" stroke="#D98B6F" stroke-width="1.5" stroke-dasharray="4 4"/>
      <text x="${W-P}" y="${(+gy-5)}" font-size="10" fill="#D98B6F" text-anchor="end" class="num">目标 140</text>
      <text x="${P}" y="${(y(W_START)+16).toFixed(1)}" font-size="9" fill="#6C7A74" text-anchor="start" class="num">起点150</text>
      <polyline points="${pts}" fill="none" stroke="#1F5C49" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      <text x="${x(li).toFixed(1)}" y="${(y(wEntries[li].v)-8).toFixed(1)}" font-size="11" font-weight="700" fill="#143D31" text-anchor="end" class="num">${wEntries[li].v.toFixed(1)}</text>
    </svg></div>`;
  }

  /* 最近记录 */
  let logList='<div class="log-empty">还没有记录，今天开始第一条吧</div>';
  if(entries.length){
    logList=entries.slice().reverse().slice(0,12).map(([d,l])=>{
      const md=d.slice(5).replace('-','/');
      const tags=[];
      const didEx=l.ex&&l.ex!=='休息'&&Number(l.min)>=10;
      if(didEx) tags.push('<span class="tag ex">运动</span>');
      if(l.drink&&l.drink!=='no') tags.push('<span class="tag drink">饮料</span>');
      const meta=[];
      if(didEx) meta.push(`${l.ex} ${l.min}分钟`);
      if(l.ex==='休息') meta.push('休息');
      if(l.weight) meta.push(`${l.weight}斤`);
      if(l.sbp&&l.dbp) meta.push(`血压${l.sbp}/${l.dbp}`);
      if(l.hr) meta.push(`静息${l.hr}`);
      if(l.sleep) meta.push(`睡${l.sleep}h`);
      if(l.waist) meta.push(`腰围${l.waist}`);
      if(l.drink&&l.drink!=='no') meta.push(`饮料${l.drinkMl||'?'}ml`);
      if(l.fruit) meta.push(`水果:${l.fruit}`);
      if(l.note) meta.push(l.note);
      return `<div class="log-item">
        <div class="ld num">${md}</div>
        <div class="lc">${meta.join(' · ')||'（空）'}</div>
        ${tags.join('')}
      </div>`;
    }).join('');
  }

  const bpNote=bpVals.length
    ? (bpWarn?`<span class="alert">家测血压平均 ${Math.round(avgS)}/${Math.round(avgD)}，已达 135/85 — 建议带记录看心内科</span>`
            :`家测血压平均 ${Math.round(avgS)}/${Math.round(avgD)} · 低于 135/85，继续观察`)
    : '血压/心率为选填，填了才有趋势';

  app.innerHTML=`
    <div class="card">
      <h2>双目标进度</h2>
      <div class="rings">
        <div class="ring-item">
          ${ring(exPct,'#1F5C49')}
          <div class="ring-label">运动 <span class="num">${exCount}/${TARGET_EX}</span> 次</div>
          <div class="ring-sub">${paceMsg}</div>
        </div>
        <div class="ring-item">
          ${ring(Math.max(wPct,0),'#D98B6F')}
          <div class="ring-label">减重 <span class="num">${lostTotal>0?lostTotal.toFixed(1):'0'}/10</span> 斤</div>
          <div class="ring-sub">${wLogged.length?`当前 ${latestW.toFixed(1)} 斤`:'起点 150 斤'}</div>
        </div>
      </div>
      <div class="grid">${gridCells}</div>
      <div class="grid-legend">
        <span><i class="dot" style="background:var(--pine)"></i>运动</span>
        <span><i class="dot" style="background:var(--amber-soft);border:1px solid var(--amber)"></i>喝了饮料</span>
        <span><i class="dot" style="background:var(--pine);border:2px solid var(--amber)"></i>运动+饮料</span>
        <span><i class="dot" style="background:#fff;border:1px solid var(--line)"></i>无记录</span>
      </div>
    </div>

    <div class="card">
      <h2>身体指标</h2>
      <div class="stats">
        <div class="stat"><div class="v num">${latestW.toFixed(1)}<small> 斤</small></div><div class="l">${wLogged.length?'最新体重':'起点体重'}</div>
          ${wLogged.length?`<div class="d num ${latestW<W_START?'down':latestW>W_START?'up':'flat'}">${(latestW-W_START)>0?'+':''}${(latestW-W_START).toFixed(1)}</div>`:''}</div>
        <div class="stat"><div class="v num">${avgSleep?avgSleep.toFixed(1):'–'}<small> h</small></div><div class="l">平均睡眠</div></div>
        <div class="stat"><div class="v num">${latestWaist?latestWaist:'–'}<small> cm</small></div><div class="l">最新腰围</div></div>
        <div class="stat"><div class="v num ${latestHR&&latestHR>100?'warn':''}">${latestHR??'–'}<small> 次</small></div><div class="l">静息心率</div></div>
        <div class="stat"><div class="v num ${bpWarn?'warn':''}">${avgS!==null?Math.round(avgS)+'/'+Math.round(avgD):'–'}</div><div class="l">血压均值</div></div>
        <div class="stat"><div class="v num">${drinkRate!==null?drinkRate+'%':'–'}</div><div class="l">无饮料天数率</div></div>
      </div>
      <div class="note-line">饮料：${elapsedDays} 天里喝了 <b class="num">${drinkDays}</b> 天 · 吃水果记录 <b class="num">${fruitDays}</b> 天<br>${bpNote}</div>
    </div>

    <div class="card">
      <h2>打卡</h2>
      <div class="frow">
        <div><label>日期</label><input type="date" id="f-date" min="${START}" max="${END}" value="${TODAY<START?START:(TODAY>END?END:TODAY)}"></div>
        <div><label>体重（斤，选填）</label><input type="number" id="f-weight" step="0.1" inputmode="decimal" placeholder="起点 150"></div>
      </div>

      <label>今天运动了吗</label>
      <div class="seg green" style="flex-wrap:wrap; gap:6px; margin-bottom:10px;">
        <div class="opt" data-ex="慢跑" style="flex:0 0 auto; padding:9px 14px;">慢跑</div>
        <div class="opt" data-ex="健身环" style="flex:0 0 auto; padding:9px 14px;">健身环</div>
        <div class="opt" data-ex="有氧拳击" style="flex:0 0 auto; padding:9px 14px;">拳击</div>
        <div class="opt" data-ex="羽毛球" style="flex:0 0 auto; padding:9px 14px;">羽毛球</div>
        <div class="opt" data-ex="骑行" style="flex:0 0 auto; padding:9px 14px;">骑行</div>
        <div class="opt" data-ex="椭圆机" style="flex:0 0 auto; padding:9px 14px;">椭圆机</div>
        <div class="opt" data-ex="其他运动" style="flex:0 0 auto; padding:9px 14px;">其他运动</div>
      </div>
      <div class="frow">
        <div><label>时长（分钟）</label><input type="number" id="f-min" inputmode="numeric" placeholder="如 30"></div>
        <div><label>—</label><div class="seg green"><div class="opt" data-rest="1">今天休息</div></div></div>
      </div>

      <label>今天喝含糖饮料了吗</label>
      <div class="seg amber" style="margin-bottom:10px;">
        <div class="opt" data-drink="no">没喝</div>
        <div class="opt" data-drink="yes">喝了</div>
      </div>
      <div class="conditional" id="drink-ml-wrap" style="display:none; margin-bottom:10px;">
        <label>喝了大概多少（ml）</label>
        <input type="number" id="f-drinkml" inputmode="numeric" placeholder="如 500（一瓶约500ml）">
      </div>

      <label>今天吃的高果糖水果（选填，点亮可多选）</label>
      <div class="seg melon" id="fruit-seg" style="flex-wrap:wrap; gap:6px; margin-bottom:6px;">
        ${FRUIT_HIGH.map(f=>`<div class="opt" data-fruit="${f}" style="flex:0 0 auto; padding:7px 12px;">${f}</div>`).join('')}
      </div>
      <input type="text" id="f-fruit-other" placeholder="其他水果/份量，如 西瓜一大块" style="margin-bottom:10px;">

      <div class="frow">
        <div><label>静息心率（选填）</label><input type="number" id="f-hr" inputmode="numeric" placeholder="晨起，如 72"></div>
        <div><label>睡眠（小时，选填）</label><input type="number" id="f-sleep" step="0.5" inputmode="decimal" placeholder="如 7"></div>
      </div>
      <div class="frow">
        <div><label>血压（选填）</label><div class="bp-pair"><input type="number" id="f-sbp" inputmode="numeric" placeholder="136"><span class="slash">/</span><input type="number" id="f-dbp" inputmode="numeric" placeholder="81"></div></div>
        <div><label>腰围（cm，选填）</label><input type="number" id="f-waist" step="0.5" inputmode="decimal" placeholder="选填"></div>
      </div>
      <div class="frow full"><div><label>备注</label><input type="text" id="f-note" maxlength="40" placeholder="选填"></div></div>
      <button class="save" id="f-save">保存记录</button>
      <div class="toast" id="f-toast"></div>
    </div>

    <div class="card"><h2>体重趋势</h2>${chart}</div>
    <div class="card"><h2>最近记录</h2>${logList}</div>
    <div class="card">
      <h2>数据备份</h2>
      <p style="font-size:.78rem; color:var(--muted); line-height:1.6; margin-bottom:12px;">
        数据只存在本浏览器里。建议每周点一次"导出备份"，把那段文字存到微信收藏或备忘录。换手机、清缓存后，用"导入恢复"粘回来即可。
      </p>
      <div style="display:flex; gap:8px; margin-bottom:10px;">
        <button class="save" id="b-export" style="margin:0; background:var(--pine);">导出备份</button>
        <button class="save" id="b-import" style="margin:0; background:var(--melon);">导入恢复</button>
      </div>
      <textarea id="b-box" placeholder="点「导出备份」后，这里会出现一段备份文字 —— 全选复制保存。&#10;恢复时把保存的文字粘进来，再点「导入恢复」。"
        style="width:100%; min-height:80px; padding:10px; border:1px solid var(--line); border-radius:9px; font-size:.78rem; font-family:ui-monospace,monospace; background:#FBFCFA; color:var(--ink); resize:vertical;"></textarea>
      <div class="toast" id="b-toast"></div>
    </div>

    <div class="card"><details><summary>规则说明</summary>
      运动满 10 分钟即记一次（慢跑/健身环/拳击/羽毛球/骑行/椭圆机/其他运动都算）<br>
      <b>节奏目标：每相邻两天至少运动 1 次</b>。系统用"运动余额"帮你盯：每过一天扣 0.5 次配额，每运动一次 +1。<br>
      余额 ≥0 = 守住节奏；连续两天都练会"存"出余额，之后可以多歇一天；欠账了会提示你补上。<br>
      所以"提前练"和"事后补"都可以，不必每两天卡得死死的，看整体节奏不掉队即可。<br>
      血压/心率/睡眠/腰围都是选填，填了才有趋势 · 水果记录是为了看清自己高果糖水果的量<br>
      数据存在本浏览器本地，固定一台设备一个浏览器打卡，别用无痕模式
    </details></div>
  `;

  /* ---- 交互 ---- */
  const $=id=>document.getElementById(id);
  let sel={ex:null,rest:false,drink:null,fruit:new Set()};

  function clearSeg(sel){ document.querySelectorAll(sel+' .opt').forEach(o=>o.classList.remove('on')); }

  document.querySelectorAll('[data-ex]').forEach(o=>o.addEventListener('click',()=>{
    const v=o.dataset.ex;
    if(sel.ex===v){ sel.ex=null; o.classList.remove('on'); }
    else{ sel.ex=v; sel.rest=false;
      document.querySelectorAll('[data-ex]').forEach(x=>x.classList.toggle('on',x.dataset.ex===v));
      document.querySelectorAll('[data-rest]').forEach(x=>x.classList.remove('on'));
    }
  }));
  document.querySelectorAll('[data-rest]').forEach(o=>o.addEventListener('click',()=>{
    sel.rest=!sel.rest; o.classList.toggle('on',sel.rest);
    if(sel.rest){ sel.ex=null; document.querySelectorAll('[data-ex]').forEach(x=>x.classList.remove('on')); }
  }));
  document.querySelectorAll('[data-drink]').forEach(o=>o.addEventListener('click',()=>{
    const v=o.dataset.drink; sel.drink=v;
    document.querySelectorAll('[data-drink]').forEach(x=>x.classList.toggle('on',x.dataset.drink===v));
    $('drink-ml-wrap').style.display = v==='yes'?'block':'none';
  }));
  document.querySelectorAll('[data-fruit]').forEach(o=>o.addEventListener('click',()=>{
    const v=o.dataset.fruit;
    if(sel.fruit.has(v)){ sel.fruit.delete(v); o.classList.remove('on'); }
    else{ sel.fruit.add(v); o.classList.add('on'); }
  }));

  function fillForm(d){
    const l=logs[d]||{};
    sel={ex:null,rest:false,drink:null,fruit:new Set()};
    clearSeg('.seg.green'); clearSeg('.seg.amber'); clearSeg('.seg.melon');
    $('f-weight').value=l.weight??''; $('f-min').value=l.min??'';
    $('f-hr').value=l.hr??''; $('f-sleep').value=l.sleep??'';
    $('f-sbp').value=l.sbp??''; $('f-dbp').value=l.dbp??'';
    $('f-waist').value=l.waist??''; $('f-note').value=l.note??'';
    $('f-drinkml').value=l.drinkMl??''; $('f-fruit-other').value='';
    if(l.ex==='休息'){ sel.rest=true; document.querySelector('[data-rest]').classList.add('on'); }
    else if(l.ex){ sel.ex=l.ex; document.querySelectorAll('[data-ex]').forEach(x=>x.classList.toggle('on',x.dataset.ex===l.ex)); }
    if(l.drink){ sel.drink=l.drink; document.querySelectorAll('[data-drink]').forEach(x=>x.classList.toggle('on',x.dataset.drink===l.drink)); $('drink-ml-wrap').style.display=l.drink==='yes'?'block':'none'; }
    if(l.fruit){
      const known=l.fruit.split(',').map(s=>s.trim());
      document.querySelectorAll('[data-fruit]').forEach(x=>{ if(known.includes(x.dataset.fruit)){ x.classList.add('on'); sel.fruit.add(x.dataset.fruit);} });
      const others=known.filter(k=>!FRUIT_HIGH.includes(k));
      if(others.length) $('f-fruit-other').value=others.join(', ');
    }
  }
  fillForm($('f-date').value);
  $('f-date').addEventListener('change',e=>fillForm(e.target.value));

  $('f-save').addEventListener('click',async()=>{
    const d=$('f-date').value, toast=$('f-toast');
    if(!d){ toast.textContent='请选日期'; toast.className='toast err'; return; }
    const sbp=$('f-sbp').value,dbp=$('f-dbp').value;
    if((sbp&&!dbp)||(!sbp&&dbp)){ toast.textContent='血压高压低压都要填'; toast.className='toast err'; return; }
    const e={};
    if(sel.rest) e.ex='休息';
    else if(sel.ex){ e.ex=sel.ex; if($('f-min').value) e.min=$('f-min').value; }
    if($('f-weight').value) e.weight=$('f-weight').value;
    if($('f-hr').value) e.hr=$('f-hr').value;
    if(sbp&&dbp){ e.sbp=sbp; e.dbp=dbp; }
    if($('f-sleep').value) e.sleep=$('f-sleep').value;
    if($('f-waist').value) e.waist=$('f-waist').value;
    if(sel.drink){ e.drink=sel.drink; if(sel.drink==='yes'&&$('f-drinkml').value) e.drinkMl=$('f-drinkml').value; }
    const fruits=[...sel.fruit];
    const other=$('f-fruit-other').value.trim();
    if(other) fruits.push(other);
    if(fruits.length) e.fruit=fruits.join(', ');
    if($('f-note').value.trim()) e.note=$('f-note').value.trim();
    if(Object.keys(e).length===0) delete logs[d]; else logs[d]=e;
    $('f-save').disabled=true;
    try{ await saveLogs(); toast.textContent='已保存 ✓'; toast.className='toast'; setTimeout(render,500); }
    catch(err){ toast.textContent='保存失败，请重试'; toast.className='toast err'; $('f-save').disabled=false; }
  });

  /* ---- 备份 / 恢复 ---- */
  const bToast=$('b-toast'), bBox=$('b-box');
  $('b-export').addEventListener('click',()=>{
    const payload={ app:'plan100', exportedAt:new Date().toISOString(), logs };
    bBox.value=JSON.stringify(payload);
    bBox.select();
    try{ document.execCommand('copy'); }catch(e){}
    if(navigator.clipboard){ navigator.clipboard.writeText(bBox.value).catch(()=>{}); }
    const n=Object.keys(logs).length;
    bToast.textContent=`已生成备份（${n} 天记录）并复制，请粘贴到微信收藏/备忘录保存`;
    bToast.className='toast';
  });
  $('b-import').addEventListener('click',async()=>{
    const raw=bBox.value.trim();
    if(!raw){ bToast.textContent='请先把备份文字粘贴到上面的框里'; bToast.className='toast err'; return; }
    let data;
    try{ data=JSON.parse(raw); }catch(e){ bToast.textContent='备份文字格式不对，请确认完整粘贴'; bToast.className='toast err'; return; }
    const incoming = data && data.logs ? data.logs : (typeof data==='object'?data:null);
    if(!incoming || typeof incoming!=='object'){ bToast.textContent='没找到有效记录，无法恢复'; bToast.className='toast err'; return; }
    const incCount=Object.keys(incoming).length;
    const curCount=Object.keys(logs).length;
    if(!confirm(`将用备份里的 ${incCount} 天记录替换当前 ${curCount} 天记录，确定恢复？`)) return;
    logs=incoming;
    try{ await saveLogs(); bToast.textContent='已恢复 ✓'; bToast.className='toast'; setTimeout(render,500); }
    catch(e){ bToast.textContent='恢复失败，请重试'; bToast.className='toast err'; }
  });
}

(async function(){ await loadLogs(); render(); })();
</script>
</body>
</html>
